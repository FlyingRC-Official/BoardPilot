services:
  api:
    build:
      context: ./api
    environment:
      BOARDPILOT_ENV: ${BOARDPILOT_ENV:-local}
      BOARDPILOT_API_HOST: ${BOARDPILOT_API_HOST:-0.0.0.0}
      BOARDPILOT_API_PORT: ${BOARDPILOT_API_PORT:-8000}
      BOARDPILOT_STORAGE_ROOT: /app/storage
      BOARDPILOT_AUDIT_LOG_PATH: ${BOARDPILOT_AUDIT_LOG_PATH:-/app/storage/audit/audit.jsonl}
      BOARDPILOT_API_KEY: ${BOARDPILOT_API_KEY:-}
      BOARDPILOT_SESSION_TTL_SECONDS: ${BOARDPILOT_SESSION_TTL_SECONDS:-86400}
      BOARDPILOT_USERS_JSON: ${BOARDPILOT_USERS_JSON:-}
      BOARDPILOT_CORS_ORIGINS: ${BOARDPILOT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BOARDPILOT_DATABASE_URL: ${BOARDPILOT_DATABASE_URL:-postgresql+psycopg://boardpilot:boardpilot@db:5432/boardpilot}
      BOARDPILOT_REDIS_URL: ${BOARDPILOT_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_BOARDPILOT_API_KEY: ${NEXT_PUBLIC_BOARDPILOT_API_KEY:-}
      NEXT_PUBLIC_BOARDPILOT_SESSION_TOKEN: ${NEXT_PUBLIC_BOARDPILOT_SESSION_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ./api
    command: ["python", "-m", "app.workers.ingestion_worker"]
    environment:
      BOARDPILOT_ENV: ${BOARDPILOT_ENV:-local}
      BOARDPILOT_STORAGE_ROOT: /app/storage
      BOARDPILOT_AUDIT_LOG_PATH: ${BOARDPILOT_AUDIT_LOG_PATH:-/app/storage/audit/audit.jsonl}
      BOARDPILOT_API_KEY: ${BOARDPILOT_API_KEY:-}
      BOARDPILOT_SESSION_TTL_SECONDS: ${BOARDPILOT_SESSION_TTL_SECONDS:-86400}
      BOARDPILOT_USERS_JSON: ${BOARDPILOT_USERS_JSON:-}
      BOARDPILOT_CORS_ORIGINS: ${BOARDPILOT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BOARDPILOT_DATABASE_URL: ${BOARDPILOT_DATABASE_URL:-postgresql+psycopg://boardpilot:boardpilot@db:5432/boardpilot}
      BOARDPILOT_REDIS_URL: ${BOARDPILOT_REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: boardpilot
      POSTGRES_PASSWORD: boardpilot
      POSTGRES_DB: boardpilot
    ports:
      - "5432:5432"
    volumes:
      - boardpilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardpilot -d boardpilot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  boardpilot_pg:
